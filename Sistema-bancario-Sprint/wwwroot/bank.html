<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Minha Conta - Caixa</title>
  <style>
    body{font-family:Inter, sans-serif;background:#f4f7fb;display:flex;align-items:center;justify-content:center;height:100vh;margin:0}
    .box{background:#fff;padding:20px;border-radius:10px;box-shadow:0 6px 18px rgba(2,6,23,.08);width:480px}
    h2{margin:0 0 10px}
    .info{margin-bottom:12px}
    label{display:block;font-size:13px;color:#6b7280;margin-bottom:8px}
    input{width:100%;padding:10px;border:1px solid #e6e9ef;border-radius:8px;margin-bottom:12px}
    button{padding:10px 14px;background:#2b6ef6;color:#fff;border:0;border-radius:8px;cursor:pointer}
    .secondary{background:#fff;color:#2b6ef6;border:1px solid #dbe4ff}
    .actions{display:flex;gap:8px;justify-content:flex-end}
    .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  </style>
</head>
<body>
  <div class="box">
    <div class="top">
      <h2>Minha Conta</h2>
      <div>
        <button id="btnLogout" class="secondary">Sair</button>
      </div>
    </div>
    <div class="info">
      <p>ID: <span id="accId"></span></p>
      <p>Tipo: <span id="accTipo"></span></p>
      <p>Saldo: <strong id="accSaldo">0.00</strong></p>
    </div>

    <label>Valor
      <input id="valor" type="number" step="0.01" value="10"/>
    </label>

    <div class="actions">
      <button id="sacar">Sacar</button>
      <button id="depositar" class="secondary">Depositar</button>
    </div>

    <pre id="resultado" style="margin-top:12px;display:none;background:#0f1724;color:#e6eef8;padding:8px;border-radius:6px"></pre>
  </div>

  <script>
    async function send(path, method='POST', body=null){
      const token = localStorage.getItem('token') || '';
      const opts = { method, headers: { 'Authorization': 'Bearer ' + token } };
      if (body){ opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
      const res = await fetch(path, opts);
      const text = await res.text();
      return { status: res.status, text };
    }

    function show(text){ const el = document.getElementById('resultado'); el.style.display='block'; el.textContent = text; }

    async function loadAccount(){
      const id = localStorage.getItem('accountId');
      const token = localStorage.getItem('token');
      if (!id || !token){ window.location.href = 'login.html'; return; }
      const r = await fetch('/api/contas/' + id, { headers: { 'Authorization': 'Bearer ' + token } });
      if (r.status !== 200){ window.location.href='login.html'; return; }
      const acc = await r.json();
      document.getElementById('accId').textContent = acc.id;
      document.getElementById('accTipo').textContent = acc.tipo || 'Conta';
      document.getElementById('accSaldo').textContent = Number(acc.saldo).toFixed(2);
    }

    document.getElementById('btnLogout').addEventListener('click', ()=>{
      localStorage.removeItem('token'); localStorage.removeItem('accountId'); window.location.href='login.html';
    });

    document.getElementById('sacar').addEventListener('click', async ()=>{
      const id = localStorage.getItem('accountId');
      const valor = parseFloat(document.getElementById('valor').value);
      const r = await send('/api/transacoes/sacar','POST',{ contaId: parseInt(id), valor, tipo: 1 });
      show(r.text);
      if (r.status===200) await loadAccount();
    });

    document.getElementById('depositar').addEventListener('click', async ()=>{
      const id = localStorage.getItem('accountId');
      const valor = parseFloat(document.getElementById('valor').value);
      const r = await send('/api/transacoes/depositar','POST',{ contaId: parseInt(id), valor, tipo: 0 });
      show(r.text);
      if (r.status===200) await loadAccount();
    });

    loadAccount();
  </script>
</body>
</html>
