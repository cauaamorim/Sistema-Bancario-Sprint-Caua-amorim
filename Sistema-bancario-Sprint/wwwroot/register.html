<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Registrar - Caixa</title>
  <style>
    body{font-family:Inter, sans-serif;background:#f4f7fb;display:flex;align-items:center;justify-content:center;height:100vh;margin:0}
    .box{background:#fff;padding:20px;border-radius:10px;box-shadow:0 6px 18px rgba(2,6,23,.08);width:360px}
    h2{margin:0 0 10px}
    label{display:block;font-size:13px;color:#6b7280;margin-bottom:8px}
    input,select{width:100%;padding:10px;border:1px solid #e6e9ef;border-radius:8px;margin-bottom:12px}
    button{width:100%;padding:10px;background:#fff;color:#2b6ef6;border:1px solid #dbe4ff;border-radius:8px;cursor:pointer}
    .link{display:block;margin-top:10px;text-align:center}
  </style>
</head>
<body>
  <div class="box">
    <h2>Criar conta</h2>
    <label>Nome<input id="nome" type="text"/></label>
    <label>Email<input id="email" type="text"/></label>
    <label>Senha<input id="senha" type="password"/></label>
    <label>Tipo de conta
      <select id="tipo">
        <option value="corrente">Corrente</option>
        <option value="empresarial">Empresarial</option>
      </select>
    </label>
    <button id="btnRegister">Criar</button>
    <a class="link" href="login.html">Já tenho conta</a>
    <pre id="resultado" style="display:none;background:#0f1724;color:#e6eef8;padding:8px;border-radius:6px;margin-top:8px"></pre>
  </div>

  <script>
    async function send(path, method='POST', body=null){
      const opts = { method, headers: {} };
      if (body){ opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
      const res = await fetch(path, opts);
      const text = await res.text();
      return { status: res.status, text };
    }

    function show(text){ const el = document.getElementById('resultado'); el.style.display='block'; el.textContent = text; }

    document.getElementById('btnRegister').addEventListener('click', async ()=>{
      const nome = document.getElementById('nome').value;
      const email = document.getElementById('email').value;
      const senha = document.getElementById('senha').value;
      const tipo = document.getElementById('tipo').value;
      const r = await send('/api/auth/register?tipo='+encodeURIComponent(tipo),'POST',{ nome, email, senha });
      if (r.status===201){
        show('Conta criada com sucesso. Você pode ir para o login.');
      } else {
        show(r.text);
      }
    });
  </script>
</body>
</html>
