<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login - Caixa</title>
  <style>
    body{font-family:Inter, sans-serif;background:#f4f7fb;display:flex;align-items:center;justify-content:center;height:100vh;margin:0}
    .box{background:#fff;padding:20px;border-radius:10px;box-shadow:0 6px 18px rgba(2,6,23,.08);width:360px}
    h2{margin:0 0 10px}
    label{display:block;font-size:13px;color:#6b7280;margin-bottom:8px}
    input{width:100%;padding:10px;border:1px solid #e6e9ef;border-radius:8px;margin-bottom:12px}
    button{width:100%;padding:10px;background:#2b6ef6;color:#fff;border:0;border-radius:8px;cursor:pointer}
    .link{display:block;margin-top:10px;text-align:center}
  </style>
</head>
<body>
  <div class="box">
    <h2>Entrar</h2>
    <label>Email<input id="email" type="text"/></label>
    <label>Senha<input id="senha" type="password"/></label>
    <button id="btnLogin">Entrar</button>
    <a class="link" href="register.html">Não tem conta? Cadastre-se</a>
    <pre id="resultado" style="display:none;background:#0f1724;color:#e6eef8;padding:8px;border-radius:6px;margin-top:8px"></pre>
  </div>

  <script>
    async function send(path, method='POST', body=null){
      const opts = { method, headers: {} };
      if (body){ opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
      const res = await fetch(path, opts);
      const text = await res.text();
      return { status: res.status, text };
    }

    function show(text){ const el = document.getElementById('resultado'); el.style.display='block'; el.textContent = text; }

    document.getElementById('btnLogin').addEventListener('click', async ()=>{
      const email = document.getElementById('email').value;
      const senha = document.getElementById('senha').value;
      const r = await send('/api/auth/login','POST',{ email, senha });
      if (r.status===200){
        const json = JSON.parse(r.text);
        localStorage.setItem('token', json.token);
        localStorage.setItem('accountId', json.id);
        window.location.href = 'bank.html';
      } else {
        show(r.text);
      }
    });
  </script>
</body>
</html>
